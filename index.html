<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:,">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="fire-mode">
<div class="container">

    <!-- Header -->
    <div style="margin-bottom: 30px;">
        <div style="display:flex; justify-content:space-between; gap:12px; margin-bottom:20px;">
            <div class="widget" style="flex:1;">
                <div class="widget-icon">🕐</div>
                <div>
                    <div class="widget-value" id="currentTime">--:--</div>
                    <div class="widget-label">New York</div>
                    <div class="widget-sublabel" id="currentDate">---</div>
                </div>
            </div>

            <div class="widget" style="flex:1;">
                <div class="widget-icon">🌤️</div>
                <div>
                    <div class="widget-value">72°F</div>
                    <div class="widget-label">Yonkers</div>
                </div>
            </div>
        </div>

        <h1 style="text-align:center; font-size:2.5em;">Kings Protocol</h1>
    </div>

    <!-- Nav -->
    <div class="nav-tabs">
        <button class="nav-tab active" onclick="showPage('dashboard')">📊 Dashboard</button>
        <button class="nav-tab" onclick="showPage('workout')">💪 Workouts</button>
        <button class="nav-tab" onclick="showPage('looksmaxxing')">💎 Looksmaxxing</button>
        <button class="nav-tab" onclick="showPage('visionBoard')">🖼️ Vision Board</button>
        <button class="nav-tab" onclick="showPage('content')">🎬 Content</button>
        <button class="nav-tab" onclick="showPage('books')">📚 Books</button>
    </div>

    <!-- Dashboard -->
    <div id="dashboardPage" class="page active">

        <!-- SCHEDULE -->
        <div class="habit-section">
            <div class="section-title">📅 Today's Schedule</div>
            <div id="scheduleContainer"></div>
        </div>

        <!-- Weekly Review button -->
        <div style="margin-bottom:16px;">
            <button onclick="openWeeklyReview()" style="
                width:100%; padding:16px 20px;
                border-radius:16px;
                border:1px solid rgba(99,102,241,0.4);
                background:linear-gradient(135deg, rgba(99,102,241,0.15), rgba(236,72,153,0.10));
                color:white; cursor:pointer;
                display:flex; align-items:center; gap:12px;
                font-size:1rem; font-weight:800;
                box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
                transition: all 0.15s;
            "
            onmouseover="this.style.background='linear-gradient(135deg, rgba(99,102,241,0.28), rgba(236,72,153,0.18))'"
            onmouseout="this.style.background='linear-gradient(135deg, rgba(99,102,241,0.15), rgba(236,72,153,0.10))'">
                <span style="font-size:1.4rem;">📋</span>
                <div style="text-align:left;">
                    <div>Weekly Review</div>
                    <div style="font-weight:500; font-size:0.82rem; color:rgba(255,255,255,0.5); margin-top:2px;">Tap to see this week's breakdown</div>
                </div>
                <span style="margin-left:auto; color:rgba(255,255,255,0.4); font-size:1.1rem;">›</span>
            </button>
        </div>

        <!-- SMART INSIGHTS -->
        <div class="habit-section">
          <div class="section-title">🧠 Smart Insights</div>
          <div id="insightsWidget"></div>
        </div>

        <!-- MOOD -->
        <div class="habit-section">
            <div class="section-title">😊 Energy & Mood</div>
            <div id="moodTracker"></div>
        </div>

        <!-- HABITS -->
        <div class="habit-section">
            <div class="section-title">📋 Daily Habits - This Week</div>
            <div id="habitGrid"></div>
        </div>

    </div>

    <!-- Other Pages -->
    <div id="workoutPage" class="page"><div id="exerciseCards"></div></div>
    <div id="looksmaxxingPage" class="page"><div id="looksMaxxingContainer"></div></div>
    <div id="visionBoardPage" class="page"><div id="visionBoardContainer"></div></div>
    <div id="contentPage" class="page"><div id="contentContainer"></div></div>
    <div id="booksPage" class="page"><div id="booksContainer"></div></div>

</div>

<!-- Modal -->
<div id="modal" class="modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modalBody"></div>
    </div>
</div>

<script>
// ─── GLOBAL MODAL SYSTEM ─────────────────────────────────────────────────────
window.openModal = function(html) {
    const modal = document.getElementById("modal");
    const body  = document.getElementById("modalBody");
    if (!modal || !body) return;
    body.innerHTML = html;
    modal.style.display = "flex";
    document.body.style.overflow = "hidden";
};

window.closeModal = function(e) {
    // If called from backdrop click, only close if clicking the backdrop itself
    if (e && e.target !== document.getElementById("modal")) return;
    const modal = document.getElementById("modal");
    if (modal) modal.style.display = "none";
    document.body.style.overflow = "";
};

// Allow ESC key to close modal
document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
        const modal = document.getElementById("modal");
        if (modal && modal.style.display !== "none") {
            modal.style.display = "none";
            document.body.style.overflow = "";
        }
    }
});

// ─── WEEKLY REVIEW ────────────────────────────────────────────────────────────
window.openWeeklyReview = function() {
    function pad(n) { return String(n).padStart(2, "0"); }
    function localKey(d) {
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    }
    function energyColor(v) {
        if (!v) return "#4b5563";
        if (v <= 3) return "#ef4444";
        if (v <= 5) return "#f97316";
        if (v <= 7) return "#eab308";
        return "#22c55e";
    }
    function bar(pct, color) {
        return `<div style="height:6px;border-radius:4px;background:rgba(255,255,255,0.08);overflow:hidden;margin-top:4px;">
            <div style="height:100%;width:${pct}%;background:${color};border-radius:4px;transition:width 0.4s ease;"></div>
        </div>`;
    }

    const today = new Date();
    const sunday = new Date(today);
    sunday.setDate(today.getDate() - today.getDay());
    sunday.setHours(0,0,0,0);

    const weekDays = [];
    for (let i = 0; i < 7; i++) {
        const d = new Date(sunday);
        d.setDate(sunday.getDate() + i);
        weekDays.push(d);
    }

    const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const habits = JSON.parse(localStorage.getItem("habits") || "[]");
    const completions = JSON.parse(localStorage.getItem("habitCompletions") || "{}");
    const moodData = JSON.parse(localStorage.getItem("moodData") || "{}");
    const plannerRaw = JSON.parse(localStorage.getItem("weeklyPlannerData") || "{}");

    const dayStats = weekDays.map((d, i) => {
        const k = localKey(d);
        const done = habits.filter(h => completions?.[k]?.[h.id]).length;
        const habitPct = habits.length ? Math.round((done / habits.length) * 100) : 0;
        const energy = moodData[k]?.energy ?? null;
        const mood = moodData[k]?.mood ?? null;
        const sleep = moodData[k]?.sleep ?? null;
        const why = moodData[k]?.why ?? null;

        let taskPct = 0;
        for (const wk of Object.keys(plannerRaw)) {
            const dayData = plannerRaw[wk]?.days?.[k];
            if (dayData && Array.isArray(dayData.tasks) && dayData.tasks.length) {
                const td = dayData.tasks.filter(x => x && x.done).length;
                taskPct = Math.max(taskPct, Math.round((td / dayData.tasks.length) * 100));
            }
        }
        const isPast = d <= today;
        return { k, name: dayNames[i], date: d.getDate(), habitPct, energy, mood, sleep, why, taskPct, isPast };
    });

    const activeDays = dayStats.filter(d => d.isPast && (d.habitPct > 0 || d.energy !== null));
    const avgHabit = activeDays.length
        ? Math.round(activeDays.reduce((s, d) => s + d.habitPct, 0) / activeDays.length) : 0;
    const energyDays = dayStats.filter(d => d.energy !== null);
    const avgEnergy = energyDays.length
        ? (energyDays.reduce((s, d) => s + d.energy, 0) / energyDays.length).toFixed(1) : null;
    const perfectDays = dayStats.filter(d => d.habitPct >= 80).length;

    const html = `
        <div style="font-size:1.2rem;font-weight:900;margin-bottom:4px;">📋 Weekly Review</div>
        <div style="color:#9CA3AF;font-size:0.85rem;margin-bottom:18px;">
            Week of ${sunday.toLocaleDateString("en-US", { month:"short", day:"numeric" })}
        </div>

        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;">
            <div style="padding:14px;border-radius:14px;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25);text-align:center;">
                <div style="font-size:1.6rem;font-weight:900;">${avgHabit}%</div>
                <div style="color:#9CA3AF;font-size:0.82rem;">Avg Habits</div>
            </div>
            <div style="padding:14px;border-radius:14px;background:rgba(34,197,94,0.10);border:1px solid rgba(34,197,94,0.25);text-align:center;">
                <div style="font-size:1.6rem;font-weight:900;">${perfectDays}/7</div>
                <div style="color:#9CA3AF;font-size:0.82rem;">80%+ Days</div>
            </div>
            <div style="padding:14px;border-radius:14px;background:rgba(236,72,153,0.10);border:1px solid rgba(236,72,153,0.25);text-align:center;">
                <div style="font-size:1.6rem;font-weight:900;">${avgEnergy ?? "—"}</div>
                <div style="color:#9CA3AF;font-size:0.82rem;">Avg Energy</div>
            </div>
        </div>

        <div style="display:grid;gap:10px;">
            ${dayStats.map(d => `
                <div style="padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);opacity:${d.isPast ? 1 : 0.45};">
                    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
                        <div style="font-weight:800;">${d.name} ${d.date}</div>
                        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                            ${d.mood ? `<span style="font-size:1.1rem;">${d.mood}</span>` : ""}
                            ${d.energy !== null ? `<span style="font-weight:800;color:${energyColor(d.energy)};">⚡${d.energy}</span>` : ""}
                            ${d.sleep !== null ? `<span style="color:#9CA3AF;font-size:0.85rem;">🛌${d.sleep}h</span>` : ""}
                            ${d.habitPct >= 80 ? `<span style="color:#22c55e;font-size:0.82rem;font-weight:800;">👑 Perfect</span>` : ""}
                        </div>
                    </div>
                    <div style="margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                        <div>
                            <div style="color:#9CA3AF;font-size:0.78rem;">Habits ${d.habitPct}%</div>
                            ${bar(d.habitPct, "linear-gradient(90deg,#6366f1,#a78bfa)")}
                        </div>
                        <div>
                            <div style="color:#9CA3AF;font-size:0.78rem;">Tasks ${d.taskPct}%</div>
                            ${bar(d.taskPct, "linear-gradient(90deg,#ec4899,#f97316)")}
                        </div>
                    </div>
                    ${d.why ? `<div style="margin-top:8px;color:#a78bfa;font-size:0.82rem;font-style:italic;">📝 ${d.why}</div>` : ""}
                </div>
            `).join("")}
        </div>
    `;

    window.openModal(html);
};
</script>
